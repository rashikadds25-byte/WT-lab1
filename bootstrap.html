<!DOCTYPE html>
<html>
<head>
<title>Bootstrap Page</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:linear-gradient(135deg,#ff9a9e,#a18cd1);font-family:sans-serif;}
.navbar,footer{background:rgba(0,0,0,0.7);}
.carousel-item{height:250px;display:flex;align-items:center;justify-content:center;color:white;font-size:25px;}
.c1{background:#ff6a00;} .c2{background:#0072ff;} .c3{background:#e100ff;}
.card{background:rgba(255,255,255,0.3);border:none;border-radius:15px;}
.btn-custom{background:#38f9d7;border:none;color:black;}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark navbar-expand-lg">
<div class="container">
<a class="navbar-brand">🌈 Site</a>
</div>
</nav>

<!-- Carousel -->
<div id="c" class="carousel slide" data-bs-ride="carousel">
<div class="carousel-inner text-center">
<div class="carousel-item active c1">Design</div>
<div class="carousel-item c2">Colors</div>
<div class="carousel-item c3">UI</div>
</div>
</div>

<!-- Cards -->
<div class="container mt-4">
<div class="row g-3 text-center">

<div class="col-md-4">
<div class="card p-3">
<h5>Fast</h5>
<button class="btn btn-custom">Go</button>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Modern</h5>
<button class="btn btn-custom">Go</button>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Flexible</h5>
<button class="btn btn-custom">Go</button>
</div>
</div>

</div>
</div>

<!-- Footer -->
<footer class="text-center text-white mt-4 p-2">
© 2026 Page
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
