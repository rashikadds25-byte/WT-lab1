<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junk Food Feast</title>
    <!-- Linking the external CSS file -->
    <link rel="stylesheet" href="food.css">
</head>
<body>

    <div class="gallery-header">
        <h1>Cheat Day <span class="highlight">Gallery</span></h1>
        <p>Hover over the items to see the flavor!</p>
    </div>

    <div class="gallery-grid">
        <!-- Item 1 -->
        <div class="food-card">
            <img src="burger.bug.jpg" alt="Burger">
            <div class="overlay">
                <span>Classic</span>
                <h3>Beef Burger</h3>
            </div>
        </div>

        <!-- Item 2 -->
        <div class="food-card">
            <img src="pizza.piz.jpg" alt="Pizza">
            <div class="overlay">
                <span>Cheesy</span>
                <h3>Hot Pizza</h3>
            </div>
        </div>

        <!-- Item 3 -->
        <div class="food-card">
            <img src="fr.fr.jpg" alt="Fries">
            <div class="overlay">
                <span>Crispy</span>
                <h3>Loaded Fries</h3>
            </div>
        </div>

        <!-- Item 4 -->
        <div class="food-card">
            <img src="bug.bug.jpg" alt="Donut">
            <div class="overlay">
                <span>Sweet</span>
                <h3>Glazed Donut</h3>
            </div>
        </div>
    </div>

</body>
</html>
