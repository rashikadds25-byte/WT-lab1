<!DOCTYPE html>
<html>
<head>
    <style>
        /* Medium size layout with a simple space theme */
        body { 
            font-family: sans-serif; 
            background: #f3eeee; /* Dark Navy Background */
            color: rgb(36, 1, 65); 
            display: flex; 
            justify-content: center; 
            padding-top: 50px;
        }
        .card { 
            width: 500px; /* Medium Width */
            background: #f1d2a8; 
            padding: 30px; 
            border-radius: 15px; 
            text-align: center;
            border-bottom: 5px solid #f0a500;
        }
        img { 
            width: 160px; 
            height: 160px; 
            border-radius: 50%; 
            border: 4px solid #e7c271; 
            object-fit: cover;
        }
        h1 { color: #d44005; margin: 15px 0 5px 0; }
        p { color: #010b11; margin-bottom: 20px; }
        
        ul { 
            text-align: left; 
            display: inline-block; 
            line-height: 1.8; 
            margin-bottom: 20px;
        }
        li b { color: #111110; }

        a { 
            background: #f3eeee; 
            color: #b80f0f; 
            text-decoration: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="images.kal.jpg" alt="Kalpana Chawla">
        
        <h1>Kalpana Chawla</h1>
        <p><i>The First Indian Woman in Space</i></p>

        <ul>
            <li><b>1962:</b> Born in Karnal, India</li>
            <li><b>1994:</b> Selected by NASA</li>
            <li><b>1997:</b> First mission (STS-87)</li>
            <li><b>2003:</b> Final mission (STS-107)</li>
        </ul>

        <br><br>
        <a href="https://wikipedia.org" target="_blank">Read More</a>
    </div>

</body>
</html>
