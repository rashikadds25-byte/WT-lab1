<!DOCTYPE html>
<html>
<head>
    <title>Scholarship Form</title>
    <style>
        form {
            background-color: white;
            padding: 15px;
            width: 50%;
            border: 1px solid black;
        }
        input, select {
            margin: 5px;
        }
    </style>
</head>

<body>

    <h1>Scholarship Application Form</h1>

    <form>

        <h3>Personal Details</h3>

        Full Name:<br>
        <input type="text" name="name"><br>

        Date of Birth:<br>
        <input type="date" name="dob"><br>

        Gender:<br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female<br>

        Contact Number:<br>
        <input type="text" name="phone"><br>

        Email:<br>
        <input type="email" name="email"><br>

        Address:<br>
        <textarea rows="3" cols="30"></textarea><br>

        <h3>Education Details</h3>

        Class:<br>
        <select>
            <option>10th</option>
            <option>11th</option>
            <option>12th</option>
        </select><br>

        Board:<br>
        <input type="text" name="board"><br>

        Percentage:<br>
        <input type="text" name="marks"><br>

        <h3>Other Details</h3>

        Family Income:<br>
        <input type="text" name="income"><br>

        Upload Documents:<br>
        <input type="file"><br><br>

        <input type="checkbox"> I agree to the terms and conditions<br><br>

        <input type="submit" value="Submit Form">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
