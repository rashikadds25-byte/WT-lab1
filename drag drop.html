<!DOCTYPE html>
<html>
<head>
<title>HTML5 APIs Demo</title>
<style>
body{
  font-family:sans-serif;
  margin:0;
  text-align:center;
  background:linear-gradient(to right,#4facfe,#00f2fe);
  color:white;
}
.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}
.card{
  background:rgba(255,255,255,0.2);
  margin:10px;
  padding:15px;
  border-radius:10px;
  width:250px;
}
.card:hover{transform:scale(1.05);}
.box{
  border:2px dashed white;
  padding:10px;
  margin:10px 0;
}
button{
  padding:5px 10px;
  border:none;
  background:green;
  color:white;
  border-radius:5px;
}
</style>
</head>

<body>

<h2>✨ HTML5 API Demo ✨</h2>

<div class="container">

<div class="card">
<h3>Drag & Drop</h3>
<div class="box" draggable="true">Drag Me</div>
<div class="box">Drop Here</div>
</div>

<div class="card">
<h3>Geolocation</h3>
<p>Latitude: --</p>
<p>Longitude: --</p>
</div>

<div class="card">
<h3>Web Storage</h3>
<input placeholder="Enter name"><br><br>
<button>Save</button>
<p>Name: --</p>
</div>

</div>

</body>
</html>
