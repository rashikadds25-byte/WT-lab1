<!DOCTYPE html>
<html>
<head>
<title>Mini Site</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(120deg,#89f7fe,#66a6ff);}
.navbar,footer{background:rgba(0,0,0,0.7);}
.box{background:rgba(255,255,255,0.3);padding:15px;border-radius:10px;}
</style>
</head>

<body>

<!-- Navbar + Dropdown -->
<nav class="navbar navbar-dark p-2">
<div class="container">
<span class="navbar-brand">🌐 MiniSite</span>
<div class="dropdown">
<button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">Menu</button>
<ul class="dropdown-menu">
<li><a class="dropdown-item">Home</a></li>
<li><a class="dropdown-item">Contact</a></li>
</ul>
</div>
</div>
</nav>

<!-- Breadcrumb -->
<div class="container mt-2">
<ol class="breadcrumb">
<li class="breadcrumb-item">Home</li>
<li class="breadcrumb-item active">Page</li>
</ol>
</div>

<!-- Responsive Layout -->
<div class="container mt-3">
<div class="row g-3">

<div class="col-md-6">
<div class="box">
<h5>Form</h5>
<input class="form-control mb-2" placeholder="Name">
<input class="form-control mb-2" placeholder="Email">
<button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#m1">Submit</button>
</div>
</div>

<div class="col-md-6">
<div class="box text-center">
<h5>Info</h5>
<button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#m2">Open</button>
</div>
</div>

</div>
</div>

<!-- Modals -->
<div class="modal fade" id="m1">
<div class="modal-dialog"><div class="modal-content p-3">Form Submitted</div></div>
</div>

<div class="modal fade" id="m2">
<div class="modal-dialog"><div class="modal-content p-3">Bootstrap Components Demo</div></div>
</div>

<!-- Footer -->
<footer class="text-center text-white mt-3 p-2">© 2026</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
